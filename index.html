<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interior AI Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    .wrap { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #888; margin-bottom: 2rem; }
    .card { background: white; border-radius: 12px; border: 1px solid #e8e8e8; overflow: hidden; margin-bottom: 16px; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #f0f0f0; font-size: 13px; font-weight: 500; color: #555; display: flex; align-items: center; gap: 8px; }
    .step-badge { background: #e8f0fe; color: #2563eb; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
    .upload-zone { margin: 16px; border: 2px dashed #ddd; border-radius: 8px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .upload-zone:hover { border-color: #aaa; background: #fafafa; }
    .upload-zone.loaded { border-style: solid; border-color: #ddd; padding: 0; overflow: hidden; }
    .upload-zone.loaded img { width: 100%; height: 100%; object-fit: cover; }
    .upload-icon { font-size: 32px; }
    .upload-text { font-size: 14px; color: #555; }
    .upload-sub { font-size: 12px; color: #aaa; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 16px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; color: #777; }
    .field select, .field textarea { font-size: 13px; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; color: #1a1a1a; width: 100%; font-family: inherit; }
    .field textarea { resize: none; height: 72px; }
    .full { grid-column: 1 / -1; }
    .chips { padding: 0 16px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #e0e0e0; color: #666; cursor: pointer; background: transparent; font-family: inherit; transition: background 0.1s; }
    .chip:hover { background: #f0f0f0; color: #1a1a1a; }
    .actions { padding: 0 16px 16px; display: flex; gap: 8px; }
    .btn { font-size: 13px; padding: 9px 18px; border-radius: 8px; border: 1px solid #e0e0e0; background: transparent; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: background 0.1s; }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: #999; border-color: #999; cursor: not-allowed; }
    .result { display: none; }
    .result.visible { display: block; }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #e8e8e8; }
    .side { background: white; }
    .side-label { font-size: 11px; color: #888; padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
    .side-img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .side-empty { width: 100%; height: 260px; display: flex; align-items: center; justify-content: center; background: #f8f8f8; }
    .spinner { width: 24px; height: 24px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { padding: 12px 16px; background: #fff5f5; color: #c0392b; font-size: 13px; border-top: 1px solid #ffe0e0; }
    .variation-row { padding: 12px 16px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Interior AI Tool</h1>
  <p class="sub">Upload an empty render — AI fills in the interior</p>

  <div class="card">
    <div class="card-header"><span class="step-badge">Step 1</span> Upload empty interior render</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">⬆</div>
      <div class="upload-text">Click to upload your empty render</div>
      <div class="upload-sub">JPG or PNG — walls, floors, windows only</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

    <div class="grid">
      <div class="field">
        <label>Style</label>
        <select id="style">
          <option>Scandinavian minimal</option>
          <option>Warm modern</option>
          <option>Industrial loft</option>
          <option>Classic luxury</option>
          <option>Mid-century modern</option>
          <option>Japandi</option>
        </select>
      </div>
      <div class="field">
        <label>Room type</label>
        <select id="room">
          <option>Living room</option>
          <option>Bedroom</option>
          <option>Kitchen</option>
          <option>Dining room</option>
          <option>Home office</option>
        </select>
      </div>
      <div class="field">
        <label>Color palette</label>
        <select id="palette">
          <option>Neutral warm whites</option>
          <option>Earth tones</option>
          <option>Cool grays and blues</option>
          <option>Dark and moody</option>
          <option>Soft pastels</option>
        </select>
      </div>
      <div class="field">
        <label>Budget feel</label>
        <select id="budget">
          <option>High-end luxury</option>
          <option>Mid-range</option>
          <option>Budget-friendly</option>
        </select>
      </div>
      <div class="field full">
        <label>Extra notes</label>
        <textarea id="notes" placeholder="e.g. round dining table, large plants near the window, no curtains..."></textarea>
      </div>
    </div>

    <div class="chips">
      <button class="chip" onclick="addNote('round sofa')">+ round sofa</button>
      <button class="chip" onclick="addNote('large indoor plants')">+ indoor plants</button>
      <button class="chip" onclick="addNote('pendant lights')">+ pendant lights</button>
      <button class="chip" onclick="addNote('herringbone floor')">+ herringbone floor</button>
      <button class="chip" onclick="addNote('built-in shelving')">+ built-in shelves</button>
      <button class="chip" onclick="addNote('fireplace')">+ fireplace</button>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="generateBtn" onclick="generate()" disabled>Generate interior</button>
      <button class="btn" onclick="reset()">Clear</button>
    </div>
  </div>

  <div class="card result" id="resultCard">
    <div class="card-header">Result</div>
    <div class="compare">
      <div class="side">
        <div class="side-label">Your empty render</div>
        <div id="beforeSide" class="side-empty"></div>
      </div>
      <div class="side">
        <div class="side-label">With AI interior</div>
        <div id="afterSide" class="side-empty"><div class="spinner"></div></div>
      </div>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <div class="variation-row">
      <button class="btn" onclick="generate()">Try again (new variation)</button>
    </div>
  </div>
</div>

<script>
let imageBase64 = null;
const SPACE_URL = 'https://adin019-interior-ai-backend.hf.space';

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    imageBase64 = ev.target.result.split(',')[1];
    const zone = document.getElementById('uploadZone');
    zone.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
    zone.classList.add('loaded');
    zone.onclick = null;
    document.getElementById('generateBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function addNote(text) {
  const el = document.getElementById('notes');
  el.value = el.value ? el.value + ', ' + text : text;
}

async function generate() {
  if (!imageBase64) return;

  const style = document.getElementById('style').value;
  const room = document.getElementById('room').value;
  const palette = document.getElementById('palette').value;
  const budget = document.getElementById('budget').value;
  const notes = document.getElementById('notes').value;
  const prompt = `${style} ${room}, ${palette}, ${budget}${notes ? ', ' + notes : ''}`;

  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('afterSide').innerHTML = `<div class="spinner"></div>`;

  const beforeSide = document.getElementById('beforeSide');
  beforeSide.innerHTML = `<img class="side-img" src="data:image/jpeg;base64,${imageBase64}">`;

  try {
    // Stap 1: Upload afbeelding direct naar de Space
    const imageBuffer = Uint8Array.from(atob(imageBase64), c => c.charCodeAt(0));
    const blob = new Blob([imageBuffer], { type: 'image/jpeg' });
    const formData = new FormData();
    formData.append('files', blob, 'render.jpg');

    const uploadRes = await fetch(`${SPACE_URL}/gradio_api/upload`, {
      method: 'POST',
      body: formData,
    });
    if (!uploadRes.ok) throw new Error('Upload mislukt: ' + await uploadRes.text());
    const uploadData = await uploadRes.json();
    const uploadedPath = uploadData?.[0];
    if (!uploadedPath) throw new Error('Geen pad terug van upload');

    // Stap 2: Start de generate job
    const startRes = await fetch(`${SPACE_URL}/gradio_api/call/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        data: [{ path: uploadedPath }, prompt]
      })
    });
    if (!startRes.ok) throw new Error('Start mislukt: ' + await startRes.text());
    const startData = await startRes.json();
    const eventId = startData?.event_id;
    if (!eventId) throw new Error('Geen event_id ontvangen');

    // Stap 3: Poll het resultaat op (direct vanuit de browser)
    let resultUrl = null;
    for (let i = 0; i < 120; i++) {
      await new Promise(r => setTimeout(r, 3000));

      const pollRes = await fetch(`${SPACE_URL}/gradio_api/call/generate/${eventId}`);
      const text = await pollRes.text();

      for (const line of text.split('\n')) {
        if (line.startsWith('data:')) {
          try {
            const data = JSON.parse(line.slice(5).trim());
            if (Array.isArray(data) && data[0]) {
              const output = data[0];
              resultUrl = output?.url || output?.path || (typeof output === 'string' ? output : null);
              if (resultUrl) break;
            }
          } catch(e) {}
        }
      }
      if (resultUrl) break;
    }

    if (!resultUrl) throw new Error('Timeout — model duurde te lang');

    // Stap 4: Toon de afbeelding
    const fullUrl = resultUrl.startsWith('http')
      ? resultUrl
      : `${SPACE_URL}/gradio_api/file=${resultUrl}`;

    document.getElementById('afterSide').innerHTML =
      `<img class="side-img" src="${fullUrl}">`;

  } catch (err) {
    document.getElementById('afterSide').innerHTML = '';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Error: ' + err.message;
  }

  document.getElementById('generateBtn').disabled = false;
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function reset() {
  imageBase64 = null;
  const zone = document.getElementById('uploadZone');
  zone.innerHTML = `<div class="upload-icon">⬆</div><div class="upload-text">Click to upload your empty render</div><div class="upload-sub">JPG or PNG — walls, floors, windows only</div>`;
  zone.classList.remove('loaded');
  zone.onclick = () => document.getElementById('fileInput').click();
  document.getElementById('notes').value = '';
  document.getElementById('generateBtn').disabled = true;
  document.getElementById('resultCard').classList.remove('visible');
}
</script>
</body>
</html>
